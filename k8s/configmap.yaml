apiVersion: v1
kind: ConfigMap
metadata:
  name: zerochain-config
  namespace: zerochain
data:
  ZEROCHAIN_LISTEN: "0.0.0.0:8080"
  ZEROCHAIN_WORKSPACE: "/workspace"
  ZEROCHAIN_CAS_DIR: "/workspace/.zerochain/cas"
  ZEROCHAIN_BROKER_ENABLED: "true"
  ZEROCHAIN_BROKER_BACKEND: "nats"
  ZEROCHAIN_BROKER_URL: "nats://nats.zerochain.svc.cluster.local:4222"
  ZEROCHAIN_CAS_BACKEND: "s3"
  ZEROCHAIN_CAS_S3_REGION: "us-east-1"
  ZEROCHAIN_CAS_S3_ENDPOINT: "http://minio.zerochain.svc.cluster.local:9000"
  ZEROCHAIN_MODEL: "gpt-4o"
  RUST_LOG: "info"
